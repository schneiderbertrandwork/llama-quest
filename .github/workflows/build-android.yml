name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      profile:
        description: 'EAS build profile'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview
          - production
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install EAS CLI
        run: npm install -g eas-cli@latest

      - name: Check Expo auth
        run: eas whoami
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Build APK
        run: eas build --platform android --profile ${{ inputs.profile || 'preview' }} --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Get build artifact URL
        id: build-url
        run: |
          URL=$(eas build:list --platform android --limit 1 --json --non-interactive 2>/dev/null | jq -r '.[0].artifacts.buildUrl // empty' 2>/dev/null || echo "")
          echo "url=$URL" >> "$GITHUB_OUTPUT"
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Download APK
        if: steps.build-url.outputs.url != ''
        run: curl -L "${{ steps.build-url.outputs.url }}" -o llama-quest.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: llama-quest-apk
          path: llama-quest.apk
          if-no-files-found: warn

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: llama-quest.apk
          name: Llama Quest ${{ github.ref_name }}
          body: |
            ## Llama Quest ${{ github.ref_name }}

            ### Install on Android
            1. Download `llama-quest.apk` below
            2. Enable "Install from unknown sources" in Android Settings → Security
            3. Open the downloaded APK to install

            ### What's included
            - Earthbound-style SNES pixel art
            - Turn-based battles with AI-themed enemies
            - 5 cities to explore (Llamatown, Forge, Vale, Ridge + Overworld)
            - Local AI education: Ollama, ChromaDB, RAG concepts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
