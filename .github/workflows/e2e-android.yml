name: E2E Android

on:
  pull_request:
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Expo prebuild (generates android/ directory)
        run: npx expo prebuild --platform android --clean

      - name: Build debug APK + test APK
        # Target :app only — assembleAndroidTest without a module prefix builds every
        # subproject's test APK (including expo-dev-client) which fails on duplicate
        # META-INF/LICENSE.md files from JUnit Jupiter JARs. Detox only needs :app.
        run: cd android && ./gradlew :app:assembleDebug :app:assembleAndroidTest -DtestBuildType=debug

      - name: Cache Metro transformer cache
        uses: actions/cache@v4
        with:
          path: /tmp/metro-*
          key: metro-${{ hashFiles('package-lock.json', 'metro.config.js', 'babel.config.js') }}
          restore-keys: metro-

      - name: Run Detox E2E tests on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          target: google_apis
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim
          disable-animations: true
          emulator-boot-timeout: 1200
          # Metro starts INSIDE the script (after the emulator has fully booted) so it
          # doesn't compete with the emulator for CPU/RAM during the slow boot phase.
          # android.device.debug uses android.attached — Detox attaches to the emulator
          # at emulator-5554 that android-emulator-runner already booted, instead of
          # trying to start a second emulator (which fails: no KVM on CI runner).
          # The emulator reaches the host Metro server at 10.0.2.2:8081.
          # Script is a separate file to avoid android-emulator-runner running each
          # YAML line as a separate sh -c call (which breaks multi-line for loops).
          script: bash e2e/run-detox.sh

      - name: Upload Detox artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: detox-artifacts
          path: e2e/artifacts/
          retention-days: 7
