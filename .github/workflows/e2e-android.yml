name: E2E Android

on:
  pull_request:
  workflow_dispatch:

jobs:
  # Job 1: Ensure the Metro transformer cache is warm before the emulator runs.
  # Node-only — no Android SDK, no emulator.
  # Cache hit: completes in <2 min.
  # Cache miss: starts Metro, requests the full Android bundle (~30 min), saves cache.
  # The e2e job cannot start until this job succeeds.
  warm-metro-cache:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Restore Metro transformer cache
        id: metro-cache
        uses: actions/cache@v4
        with:
          path: /tmp/metro-*
          key: metro-${{ hashFiles('package-lock.json', 'metro.config.js', 'babel.config.js') }}
          restore-keys: metro-

      - name: Warm Metro bundle (cache miss only)
        if: steps.metro-cache.outputs.cache-hit != 'true'
        run: |
          CI=1 EXPO_NO_TELEMETRY=1 npx expo start --port 8081 &
          METRO_PID=$!
          for i in $(seq 1 45); do
            curl -sf http://localhost:8081/status > /dev/null 2>&1 && echo "Metro ready after ${i} attempts" && break
            sleep 2
          done
          echo "Requesting Android bundle to populate Metro transformer cache..."
          # package.json main=expo-router/entry — correct bundle URL is /node_modules/expo-router/entry.bundle
          # /index.bundle returns 404 for this Expo Router project (no index.ts in project root)
          curl -sf "http://localhost:8081/node_modules/expo-router/entry.bundle?platform=android&dev=true&minify=false" \
            -o /dev/null --max-time 2400 \
            && echo "Bundle warmed successfully" \
            || echo "WARNING: bundle warm timed out — Metro cache still partially populated"
          kill $METRO_PID 2>/dev/null || true
        # actions/cache post-step automatically saves /tmp/metro-* after this job.

  # Job 2: Build APK and run Detox E2E tests.
  # Restores the warm Metro cache guaranteed by Job 1.
  # Bundle serves in ~30s. All 3 suites complete in ~30-40 min.
  e2e:
    needs: warm-metro-cache
    runs-on: ubuntu-latest
    # run-detox.sh blocks for up to 1800s waiting for the bundle to compile, then tests
    # run in ~25-35 min. Total: emulator boot (14 min) + pre-warm (up to 30 min) + tests.
    timeout-minutes: 150

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Expo prebuild (generates android/ directory)
        run: npx expo prebuild --platform android --clean

      - name: Inspect AndroidManifest (full dump)
        run: |
          echo "=== Full AndroidManifest.xml ==="
          cat android/app/src/main/AndroidManifest.xml
          echo "==="

      - name: Inspect Gradle files (post-prebuild diagnostic)
        run: |
          echo "=== android/settings.gradle ==="
          cat android/settings.gradle || echo "(not found)"
          echo "=== android/build.gradle ==="
          cat android/build.gradle || echo "(not found)"
          echo "=== android/app/build.gradle (full) ==="
          cat android/app/build.gradle || echo "(not found)"
          echo "=== DetoxTest.java ==="
          cat android/app/src/androidTest/java/com/llamaquest/app/DetoxTest.java || echo "(not found)"
          echo "==="

      - name: Free disk space for emulator
        # The default ubuntu-latest runner has ~14 GB free, but the API 34 google_apis
        # emulator userdata partition needs ~7.4 GB.  After the Gradle build the runner
        # is down to ~3.5 GB, which is not enough — the emulator logs
        # "FATAL | Not enough space to create userdata partition" and exits immediately,
        # so ADB never sees it and the 1200 s boot-timeout spins to exhaustion.
        # Remove large pre-installed packages that we don't need for E2E:
        #   - /usr/local/lib/android/sdk: pre-installed SDK (we install our own via setup-android)
        #     NOTE: do NOT remove this before the build — setup-android is already done.
        #     Instead only clean the big items that aren't needed at this point.
        #   - /opt/hostedtoolcache: language runtimes we don't use (Haskell, PyPy, Ruby, Go …)
        #   - /usr/share/dotnet, /usr/local/share/powershell: .NET / PS toolchain
        #   - /usr/share/swift: Swift compiler
        # This typically recovers ~10-12 GB, leaving plenty of room for the emulator.
        run: |
          echo "=== Disk before cleanup ==="
          df -h /
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo rm -rf /opt/hostedtoolcache/go
          sudo rm -rf /opt/hostedtoolcache/node/20* /opt/hostedtoolcache/node/21* /opt/hostedtoolcache/node/23*
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/share/powershell
          sudo rm -rf /usr/share/swift
          sudo rm -rf /usr/local/julia*
          sudo rm -rf /usr/lib/google-cloud-sdk
          sudo rm -rf /usr/share/miniconda
          sudo docker system prune -af --volumes 2>/dev/null || true
          echo "=== Disk after cleanup ==="
          df -h /

      - name: Build debug APK + test APK
        # Target :app only — assembleAndroidTest without a module prefix builds every
        # subproject's test APK (including expo-dev-client) which fails on duplicate
        # META-INF/LICENSE.md files from JUnit Jupiter JARs. Detox only needs :app.
        run: cd android && ./gradlew :app:assembleDebug :app:assembleAndroidTest -DtestBuildType=debug

      - name: Restore Metro transformer cache
        uses: actions/cache@v4
        with:
          path: /tmp/metro-*
          key: metro-${{ hashFiles('package-lock.json', 'metro.config.js', 'babel.config.js') }}
          restore-keys: metro-

      # Start Metro BEFORE the emulator boots so the HTTP server is ready.
      # run-detox.sh does a blocking pre-warm of the bundle (after ADB reverse is set),
      # which caches the bundle in Metro's memory before any launchApp() is called.
      - name: Start Metro bundler
        run: |
          CI=1 EXPO_NO_TELEMETRY=1 npx expo start --port 8081 > /tmp/metro.log 2>&1 &
          echo $! > /tmp/metro.pid
          for i in $(seq 1 45); do
            curl -sf http://localhost:8081/status > /dev/null 2>&1 \
              && echo "Metro ready after ${i} attempts (PID $(cat /tmp/metro.pid))" && break
            sleep 2
          done
          echo "Metro started — run-detox.sh will pre-warm the bundle after emulator boots"

      - name: Run Detox E2E tests on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          target: google_apis
          avd-name: test
          cores: 2
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim
          disable-animations: true
          emulator-boot-timeout: 1200
          emulator-port: 5554
          # 4 GB userdata partition — enough for test APKs, well under the ~8+ GB free
          # after the disk-cleanup step above.  Default (~7.4 GB) caused FATAL crash
          # on runners that only had ~3.5 GB available after the Gradle build.
          disk-size: 4096M
          # Metro is already running (started before emulator boot).
          # run-detox.sh detects it via /status and skips the start step.
          script: bash e2e/run-detox.sh

      - name: Upload Detox artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: detox-artifacts
          path: |
            e2e/artifacts/
            /tmp/metro.log
            /tmp/bundle-prewarm.log
            /tmp/logcat.log
          retention-days: 7
