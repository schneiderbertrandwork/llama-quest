name: E2E Android

on:
  pull_request:
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Expo prebuild (generates android/ directory)
        run: npx expo prebuild --platform android --clean

      - name: Build debug APK + test APK
        # Target :app only — assembleAndroidTest without a module prefix builds every
        # subproject's test APK (including expo-dev-client) which fails on duplicate
        # META-INF/LICENSE.md files from JUnit Jupiter JARs. Detox only needs :app.
        run: cd android && ./gradlew :app:assembleDebug :app:assembleAndroidTest -DtestBuildType=debug

      - name: Start Metro bundler in background
        # expo-dev-client loads the JS bundle from Metro at runtime.
        # Without Metro running, the app shows "Connect to development server"
        # and Detox can never find game UI elements.
        # The emulator reaches the host's Metro at 10.0.2.2:8081.
        run: |
          EXPO_NO_TELEMETRY=1 npx expo start --port 8081 --non-interactive &
          echo "Waiting for Metro to be ready on port 8081..."
          for i in $(seq 1 45); do
            if curl -sf http://localhost:8081/status > /dev/null 2>&1; then
              echo "Metro ready after ${i}x2 seconds"
              break
            fi
            sleep 2
          done

      - name: Run Detox E2E tests on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          target: google_apis
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim
          disable-animations: true
          script: npx detox test -c android.emu.debug --headless --record-logs failing

      - name: Upload Detox artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: detox-artifacts
          path: e2e/artifacts/
          retention-days: 7
