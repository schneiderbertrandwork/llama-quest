<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Sprite Preview</title>
<style>
  body { background: #1a1a2e; color: #fff; font-family: monospace; padding: 20px; }
  h2 { color: #c0a060; margin: 4px 0; font-size: 13px; }
  .grid { display: flex; flex-wrap: wrap; gap: 20px; }
  .sprite-box { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  canvas { image-rendering: pixelated; border: 1px solid #333; }
</style>
</head>
<body>
<h1 style="color:#c0a060">Llama Quest — Sprite Preview (8x scale)</h1>
<div class="grid" id="grid"></div>
<script>
// Shared colors
const FACE = '#f0d898', EYE = '#2a1a0a', ESC = '#ffffff';

// ── Pixel art helper ─────────────────────────────────────────────
function px(size, grid, map) {
  return grid.replace(/\s/g, '').slice(0, size * size).split('')
    .map(c => c === '.' ? null : (map[c] ?? null));
}

  // PLAYER Frame 0

    ...HHbHHHHbHH...
    ...HHewHHweHH...
    ....HHnHHHHH....
    ....HHmHHmHH....
    ...SYYYYYYYYS...
    ...SJJJJJJJJS...
    ...SYYYYYYYYS...
    ....PPPPPPPP....
    ....PPP..PPP....
    ....PPP..PPP....
    ....GGG..GGG....
    ................
  `, { R:'#d04828', H:'#f0d898', D:'#2a1808', b:'#3a2808', e:'#2a1a0a', w:'#ffffff', n:'#3a2808', m:'#2a1a0a', Y:'#f0e040', J:'#4a88d0', S:'#4a3020', P:'#3060a0', G:'#d04828' })},

  // PLAYER Frame 1 (walking)
  { name: 'Player F1', size: 16, pixels: px(16, `
    ....RRRRRRRR....
    ...RRRRRRRRRR...
    .DDRRRRRRRRRDD..
    ...HHHHHHHHHH...
    ...HHbHHHHbHH...
    ...HHewHHweHH...
    ....HHnHHHHH....
    ....HHmHHmHH....
    ...SYYYYYYYYS...
    ...SJJJJJJJJS...
    ...SYYYYYYYYS...
    ....PPPPPPPP....
    ...PPP....PPP...
    ...PPP....PPP...
    ...GGG....GGG...
    ................
  `, { R:'#d04828', H:'#f0d898', D:'#2a1808', b:'#3a2808', e:'#2a1a0a', w:'#ffffff', n:'#3a2808', m:'#2a1a0a', Y:'#f0e040', J:'#4a88d0', S:'#4a3020', P:'#3060a0', G:'#d04828' })},

  // ELDER
  { name: 'Elder', size: 16, pixels: px(16, `
    ....GGGGGGGG....
    ...GGGGGGGGGG...
    ..GGGGGGGGGGGG..
    ...FFFFFFFFFF...
    ...FFqFFFFqFF...
    ...FFewFFweFF...
    ...FFFFFFFFFF...
    ....FFFFFFFF....
    ..DPPPPPPPPPPD..
    ..DPPPPPPPPPPD..
    ..DPPPPPPPPPPD..
    ....LLL..LLL....
    ....LLL..LLL....
    ....LLL..LLL....
    ....ttt..ttt....
    ................
  `, { G:'#c0a030', F:'#f0d080', q:EYE, e:EYE, w:ESC, P:'#7840a0', D:'#4a2060', L:'#7840a0', t:'#8a6840' })},

  // PIP
  { name: 'Pip', size: 16, pixels: px(16, `
    YY.YYYYYY.YY....
    Y..YYYYYY..Y....
    .YYYYYYYYYY.....
    ...FFFFFFFFFF...
    ...FFqFFFFqFF...
    ...FFewFFweFF...
    ...FFFFFFFFFF...
    ....FFFFFFFF....
    ..DPPPPPPPPPPD..
    ..DPPPPPPPPPPD..
    ..DPPPPPPPPPPD..
    ....LLL..LLL....
    ....LLL..LLL....
    ....LLL..LLL....
    ....bbb..bbb....
    ................
  `, { Y:'#f0d840', F:FACE, q:EYE, e:EYE, w:ESC, P:'#e060a0', D:'#801850', L:'#e060a0', b:'#2060d0' })},

  // SMITH
  { name: 'Smith', size: 16, pixels: px(16, `
    ..W.WWWWWW.W....
    .WWWWWWWWWWW....
    WWWWWWWWWWWWWW..
    ...FFFFFFFFFF...
    ...FFqFFFFqFF...
    ...FFewFFweFF...
    ...FFFFFFFFFF...
    ....FFFFFFFF....
    ..DOOOOOOOOOOD..
    ..DOOOOOOOOOOD..
    ..DOOOOOOOOOOD..
    ....LLL..LLL....
    ....LLL..LLL....
    ....LLL..LLL....
    ....bbb..bbb....
    ................
  `, { W:'#484848', F:FACE, q:EYE, e:EYE, w:ESC, O:'#d85020', D:'#6a2010', L:'#d85020', b:'#5a3010' })},

  // ORACLE
  { name: 'Oracle', size: 16, pixels: px(16, `
    .WW.WWWWWW.WW...
    WWWWWWWWWWWWWW..
    WWWWWWWWWWWWWW..
    ...FFFFFFFFFF...
    ...FFqFFFFqFF...
    ...FFewFFweFF...
    ...FFFFFFFFFF...
    ....FFFFFFFF....
    ..DVVVVVVVVVVD..
    ..DVVVVVVVVVVD..
    ..DVVVVVVVVVVD..
    ....LLL..LLL....
    ....LLL..LLL....
    ....LLL..LLL....
    ....mmm..mmm....
    ................
  `, { W:'#7040a0', F:FACE, q:EYE, e:EYE, w:ESC, V:'#8050c0', D:'#301840', L:'#8050c0', m:'#5a2880' })},

  // VECTOR
  { name: 'Vector', size: 16, pixels: px(16, `
    ...W..WWWWWWW...
    ..WWWWWWWWWWW...
    .WWWWWWWWWWWW...
    ...FFFFFFFFFF...
    ...FFqFFFFqFF...
    ...FFewFFweFF...
    ...FFFFFFFFFF...
    ....FFFFFFFF....
    ..DAAAAAAAAAAD..
    ..DAAAAAAAAAAD..
    ..DAAAAAAAAAAD..
    ....LLL..LLL....
    ....LLL..LLL....

    ....nnn..nnn....
    ................
  `, { W:'#f0c820', F:FACE, q:EYE, e:EYE, w:ESC, A:'#30a0e0', D:'#184870', L:'#30a0e0', n:'#102848' })},

  // ARTIFICER
  { name: 'Artificer', size: 16, pixels: px(16, `
    .....WWWWWWWW...
    ...WWWWWWWWWW...
    .WWWWWWWWWWWW...
    ...FFFFFFFFFF...
    ...FFqFFFFqFF...
    ...FFooFFooFF...
    ...FFFFFFFFFF...
    ....FFFFFFFF....

    ..DCCCCCCCCCCD..
    ..DCCCCCCCCCCD..
    ....LLL..LLL....
    ....LLL..LLL....
    ....LLL..LLL....
    ....ddd..ddd....
    ................
  `, { W:'#304888', F:FACE, q:EYE, o:'#40a0f0', C:'#4070c0', D:'#182848', L:'#4070c0', d:'#102040' })},

  // ARCHITECT
  { name: 'Architect', size: 16, pixels: px(16, `
    ........WWWWWW..

    .WWWWWWWWWWWW...
    ...FFFFFFFFFF...

    ...FFewFFweFF...
    ...FFFFFFFFFF...

    ..DGGGGGGGGGGD..
    ..DGGGGGGGGGGD..
    ..DGGGGGGGGGGD..

  `, { W:'#208060', F:FACE, q:EYE, e:EYE, w:ESC, G:'#40b080', D:'#103828', L:'#40b080', v:'#6a4020' })},

  // KEEPER
  { name: 'Keeper', size: 16, pixels: px(16, `
    .WW...WW...WW...
    .WWWWWWWWWWWW...
    .WWWWWWWWWWWW...
    ...FFFFFFFFFF...
    ...FFqFFFFqFF...
    ...FFewFFweFF...
    ...FFFFFFFFFF...
    ....FFFFFFFF....
    ..DIIIIIIIIIID..
    ..DIIIIIIIIIID..
    ..DIIIIIIIIIID..
    ....LLL..LLL....
    ....LLL..LLL....
    ....LLL..LLL....
    ....ppp..ppp....
    ................
  `, { W:'#504090', F:FACE, q:EYE, e:EYE, w:ESC, I:'#6050a0', D:'#201838', L:'#6050a0', p:'#401860' })},

];

// ── Render ────────────────────────────────────────────────────────
const SCALE = 8;
const BG = '#1a2a1a';
const grid = document.getElementById('grid');

sprites.forEach(({ name, size, pixels }) => {
  const box = document.createElement('div');
  box.className = 'sprite-box';

  const label = document.createElement('h2');
  label.textContent = name;
  box.appendChild(label);

  const canvas = document.createElement('canvas');
  const dim = size * SCALE;
  canvas.width = dim;
  canvas.height = dim;
  canvas.style.width = dim + 'px';
  canvas.style.height = dim + 'px';
  const ctx = canvas.getContext('2d');

  // Checkerboard background (transparent areas)
  for (let row = 0; row < size; row++) {
    for (let col = 0; col < size; col++) {
      const checker = (row + col) % 2 === 0 ? '#2a2a3a' : '#1a1a2a';
      ctx.fillStyle = checker;
      ctx.fillRect(col * SCALE, row * SCALE, SCALE, SCALE);
    }
  }

  // Draw pixels
  pixels.forEach((color, i) => {
    if (!color) return;
    const row = Math.floor(i / size);
    const col = i % size;
    ctx.fillStyle = color;
    ctx.fillRect(col * SCALE, row * SCALE, SCALE, SCALE);
    // Subtle pixel border
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.fillRect(col * SCALE, row * SCALE, SCALE, 1);
    ctx.fillRect(col * SCALE, row * SCALE, 1, SCALE);
  });

  box.appendChild(canvas);

  // Also show 4x scale (game size)
  const label2 = document.createElement('h2');
  label2.textContent = '4x (in-game)';
  box.appendChild(label2);

  const canvas2 = document.createElement('canvas');
  const dim2 = size * 4;
  canvas2.width = dim2;
  canvas2.height = dim2;
  canvas2.style.width = dim2 + 'px';
  canvas2.style.height = dim2 + 'px';
  const ctx2 = canvas2.getContext('2d');
  ctx2.imageSmoothingEnabled = false;
  ctx2.drawImage(canvas, 0, 0, dim2, dim2);
  box.appendChild(canvas2);

  grid.appendChild(box);
});
</script>
</body>
</html>
